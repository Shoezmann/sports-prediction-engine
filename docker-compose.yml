services:
  postgres:
    image: postgres:16-alpine
    container_name: sp-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sports_prediction}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sp_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-sports_prediction_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-sports_prediction}']
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - dev
      - full

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: sp-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sports_prediction}:${POSTGRES_PASSWORD:-sp_dev_password}@postgres:5432/${POSTGRES_DB:-sports_prediction_db}
      JWT_SECRET: ${JWT_SECRET:-super-secret-fallback-key-for-dev}
      NODE_ENV: production
    profiles:
      - full

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: sp-frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - backend
    profiles:
      - full

volumes:
  postgres_data:
    driver: local
